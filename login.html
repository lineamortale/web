<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ModHub - Login</title>
    <link rel="stylesheet" href="/assets/main-7BRnCNmq.css" />
    <style>
      :root {
        --color-bg: #0a0a0f;
        --card-bg: #12121a;
        --card-border: #1e1e2e;
        --input-bg: #0d0d14;
        --input-border: #2a2a3d;
        --input-focus: #6d5dfc;
        --text-primary: #ffffff;
        --text-secondary: #9ca3af;
        --text-muted: #6b7280;
        --accent-gradient: linear-gradient(135deg, #f97316, #7c3aed);
        --btn-gradient: linear-gradient(135deg, #6d5dfc 0%, #7c3aed 100%);
      }

      body {
        background: var(--color-bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      }

      .login-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .login-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .login-logo {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        background: var(--accent-gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }

      .login-logo svg {
        width: 28px;
        height: 28px;
        color: white;
      }

      .login-title {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 8px;
      }

      .login-subtitle {
        font-size: 14px;
        color: var(--text-secondary);
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }

      .form-input {
        width: 100%;
        padding: 14px 16px;
        background: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 15px;
        transition: all 0.2s ease;
        outline: none;
      }

      .form-input::placeholder {
        color: var(--text-muted);
      }

      .form-input:focus {
        border-color: var(--input-focus);
        box-shadow: 0 0 0 3px rgba(109, 93, 252, 0.15);
      }

      .form-input:hover {
        border-color: #3a3a50;
      }

      .password-wrapper {
        position: relative;
      }

      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s ease;
      }

      .password-toggle:hover {
        color: var(--text-secondary);
      }

      .form-options {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .remember-me input {
        width: 16px;
        height: 16px;
        accent-color: var(--input-focus);
        border-radius: 4px;
        cursor: pointer;
      }

      .remember-me span {
        font-size: 14px;
        color: var(--text-secondary);
      }

      .forgot-link {
        font-size: 14px;
        color: #6d5dfc;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .forgot-link:hover {
        color: #8b7dfc;
      }

      .login-btn {
        width: 100%;
        padding: 14px 24px;
        background: var(--btn-gradient);
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 15px rgba(109, 93, 252, 0.3);
      }

      .login-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(109, 93, 252, 0.4);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .error-message {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 10px;
        padding: 12px 16px;
        margin-bottom: 20px;
        display: none;
        align-items: center;
        gap: 10px;
      }

      .error-message.show {
        display: flex;
      }

      .error-message svg {
        color: #ef4444;
        flex-shrink: 0;
      }

      .error-message span {
        color: #fca5a5;
        font-size: 14px;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 24px 0;
      }

      .divider-line {
        flex: 1;
        height: 1px;
        background: var(--card-border);
      }

      .divider-text {
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .back-link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px;
        background: transparent;
        border: 1px solid var(--card-border);
        border-radius: 12px;
        color: var(--text-secondary);
        font-size: 14px;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .back-link:hover {
        background: rgba(255, 255, 255, 0.02);
        border-color: #3a3a50;
        color: var(--text-primary);
      }

      .navbar-glass {
        background: rgba(10, 10, 15, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .gradient-text {
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .font-pixel {
        font-family: 'Press Start 2P', monospace;
      }

      @media (max-width: 480px) {
        .login-card {
          padding: 28px 20px;
        }

        .form-options {
          flex-direction: column;
          gap: 12px;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar-glass fixed top-0 left-0 right-0 z-50">
      <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
        <a href="/" class="flex items-center gap-3">
          <div class="w-8 h-8 rounded flex items-center justify-center" style="background: linear-gradient(135deg, #f97316, #7c3aed)">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
              <path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"></path>
              <path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"></path>
              <path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"></path>
            </svg>
          </div>
          <span class="font-pixel text-xs text-white tracking-tight">MOD<span class="gradient-text">HUB</span></span>
        </a>
      </div>
    </nav>

    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="login-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <h1 class="login-title">Welcome back</h1>
          <p class="login-subtitle">Sign in to access your admin dashboard</p>
        </div>

        <div id="error-message" class="error-message">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span id="error-text">Invalid username or password</span>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Enter your password"
                autocomplete="current-password"
                required
              />
              <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password visibility">
                <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                  <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                  <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
                  <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
                  <line x1="2" y1="2" x2="22" y2="22"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember" name="remember" />
              <span>Remember me</span>
            </label>
          </div>

          <button type="submit" class="login-btn" id="login-btn">
            Sign in
          </button>
        </form>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">or</span>
          <div class="divider-line"></div>
        </div>

        <a href="/" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19-7-7 7-7"></path>
            <path d="M19 12H5"></path>
          </svg>
          Back to ModHub
        </a>
      </div>
    </div>

    <script>
      const ADMIN_USER = 'tigercecco';
      const ADMIN_PASS = 'tigercecco';
      const ROLE_KEY = 'modhub_role';

      const form = document.getElementById('login-form');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const errorMessage = document.getElementById('error-message');
      const errorText = document.getElementById('error-text');
      const togglePassword = document.getElementById('toggle-password');
      const eyeIcon = document.getElementById('eye-icon');
      const eyeOffIcon = document.getElementById('eye-off-icon');
      const loginBtn = document.getElementById('login-btn');

      // Check if already logged in
      if (localStorage.getItem(ROLE_KEY) === 'admin') {
        window.location.href = '/mods.html';
      }

      // Toggle password visibility
      togglePassword.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        eyeIcon.style.display = isPassword ? 'none' : 'block';
        eyeOffIcon.style.display = isPassword ? 'block' : 'none';
      });

      // Form submission
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        // Hide previous error
        errorMessage.classList.remove('show');

        // Disable button during validation
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';

        // Simulate brief delay for UX
        setTimeout(() => {
          if (username === ADMIN_USER && password === ADMIN_PASS) {
            localStorage.setItem(ROLE_KEY, 'admin');
            window.location.href = '/mods.html';
          } else {
            errorText.textContent = 'Invalid username or password';
            errorMessage.classList.add('show');
            loginBtn.disabled = false;
            loginBtn.textContent = 'Sign in';
            
            // Shake animation on error
            form.style.animation = 'shake 0.5s ease';
            setTimeout(() => {
              form.style.animation = '';
            }, 500);
          }
        }, 500);
      });

      // Add shake animation
      const style = document.createElement('style');
      style.textContent = `
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
          20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
      `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
